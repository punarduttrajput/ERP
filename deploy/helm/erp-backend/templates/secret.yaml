apiVersion: v1
kind: Secret
metadata:
  name: {{ include "erp-backend.fullname" . }}-secrets
  labels:
    {{- include "erp-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__Write: {{ .Values.secrets.connectionStrings.write | quote }}
  ConnectionStrings__Read: {{ .Values.secrets.connectionStrings.read | quote }}
  Jwt__Key: {{ .Values.secrets.jwt.key | quote }}
  Jwt__Issuer: {{ .Values.secrets.jwt.issuer | quote }}
  Jwt__Audience: {{ .Values.secrets.jwt.audience | quote }}
  Redis__ConnectionString: {{ .Values.secrets.redis.connectionString | quote }}
  Encryption__Key: {{ .Values.secrets.encryption.key | quote }}
  PaymentGateway__RazorpayKeyId: {{ .Values.secrets.paymentGateway.razorpayKeyId | quote }}
  PaymentGateway__RazorpayWebhookSecret: {{ .Values.secrets.paymentGateway.razorpayWebhookSecret | quote }}
  PaymentGateway__Secret: {{ .Values.secrets.paymentGateway.secret | quote }}
  Biometric__ApiKey: {{ .Values.secrets.biometric.apiKey | quote }}
  Transport__GpsWebhookSecret: {{ .Values.secrets.transport.gpsWebhookSecret | quote }}
  Transport__ManagerMobile: {{ .Values.secrets.transport.managerMobile | quote }}
