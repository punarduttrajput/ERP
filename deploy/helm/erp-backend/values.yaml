replicaCount: 2

image:
  repository: plasmacomp/erp-backend
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  hosts:
    - host: api.erpplatform.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: erp-api-tls
      hosts:
        - api.erpplatform.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

env:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: "http://+:8080"
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "false"

# Secrets — override in values.staging.yaml / values.production.yaml
secrets:
  connectionStrings:
    write: ""
    read: ""
  jwt:
    key: ""
    issuer: "erp-platform"
    audience: "erp-clients"
  redis:
    connectionString: "redis:6379"
  encryption:
    key: ""
  paymentGateway:
    razorpayKeyId: ""
    razorpayWebhookSecret: ""
    secret: ""
  biometric:
    apiKey: ""
  transport:
    gpsWebhookSecret: ""
    managerMobile: ""
  finance:
    feeReceivableAccountCode: "1100"
    cashAccountCode: "1010"
  hangfire:
    dashboardPath: "/hangfire"
