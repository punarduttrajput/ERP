version: '3.9'
services:
  proxysql:
    image: proxysql/proxysql:2.5.5
    volumes:
      - ./proxysql.cnf:/etc/proxysql.cnf
      - proxysql_data:/var/lib/proxysql
    ports:
      - "6033:6033"   # MySQL protocol
      - "6032:6032"   # Admin interface
      - "6080:6080"   # Web UI
    restart: unless-stopped

volumes:
  proxysql_data:
